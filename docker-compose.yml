name: ${COMPOSE_PROJECT_NAME:-osshp}
# ^ Defaults to "osshp" for normal single-instance use. A worktree, a
#   second local copy, or a test/CI instance MUST NOT rely on the default —
#   export COMPOSE_PROJECT_NAME (or pass -p <name>) so it cannot collide
#   with a live "osshp" project. A hard-coded name here previously let a
#   fresh shell in an unrelated checkout target and recreate the LIVE
#   containers by accident (2026-07-03 incident).

# Portable single-stack deployment: runs on the owner's Docker host now,
# VPS later — no code changes required. All operator config comes from the
# .env file (copy .env.example → .env, fill in every CHANGE_ME value).
#
# First-run checklist:
#   1. ./scripts/setup.sh           # creates .env + config/garage.toml from examples
#   2. Fill in CHANGE_ME values in .env and config/garage.toml
#   3. docker compose up -d
#   4. Run Garage init commands from the setup runbook (docs/setup-runbook.md)
#   5. Open https://<OSSHP_DOMAIN> in a browser
#
# `docker compose up` on its own (exactly as above, no extra -f flags) is
# ALWAYS the secure production posture: Caddy terminates TLS, the app serves
# Secure session cookies, and no port bypasses the proxy. Compose auto-merges
# any file literally named `docker-compose.override.yml` by filename
# convention — this repo intentionally has no such file, because that
# auto-merge is exactly the footgun that let a dev config silently downgrade
# a deployment (issue 022). Local plain-HTTP dev (Caddy bypassed, insecure
# cookies) lives in `docker-compose.dev.yml`, which Compose never merges
# automatically — see that file for the explicit opt-in command.

services:

  # --------------------------------------------------------------------------
  # app — Next.js (App Router) + Bun, standalone build
  # --------------------------------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NODE_ENV: production
      # Database
      DATABASE_URL: ${DATABASE_URL}
      # Object storage (S3-compatible via minio client → Garage)
      S3_ENDPOINT: "http://storage:3900"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-osshp-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Session & auth
      SESSION_SECRET: ${SESSION_SECRET}
      # Encryption (AES-256-GCM for TOTP secrets at rest)
      OSSHP_ENCRYPTION_KEY: ${OSSHP_ENCRYPTION_KEY}
      # WebAuthn — pinned from operator config, NEVER from request headers
      OSSHP_RP_ID: ${OSSHP_RP_ID}
      OSSHP_ORIGIN: ${OSSHP_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_started
    networks:
      - internal
    # A boot-time secret-strength assertion failure (weak/example SESSION_SECRET
    # or OSSHP_ENCRYPTION_KEY — instrumentation.ts) is fail-closed: the process
    # stays alive and serves HTTP 500 on every request instead of exiting
    # (security-gate-021 O-1). Without a healthcheck, `docker ps` reports "Up"
    # for a fully-refused instance. /api/health is a public, unauthenticated
    # route that 500s in that same failed state, so it doubles as the
    # fail-closed signal: healthy only when the app is actually serving.
    # Use 127.0.0.1, not localhost: Alpine's wget resolves "localhost" to
    # ::1 first, and the app only binds IPv4 (0.0.0.0) — "localhost" 500s
    # the healthcheck itself with connection-refused, live-verified 2026-07-02.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --------------------------------------------------------------------------
  # db — PostgreSQL 17
  # Digest pinned for supply-chain reproducibility (A05/A06/A08 — M2.6).
  # To bump: docker pull postgres:17-alpine && docker inspect postgres:17-alpine
  #          --format '{{index .RepoDigests 0}}' — update digest below.
  # --------------------------------------------------------------------------
  db:
    image: postgres:17-alpine@sha256:dc17045ccfd343b49600570ea734b9c4991cf1c3f3302e67df51e3b402dd55c4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osshp}
      POSTGRES_USER: ${POSTGRES_USER:-osshp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osshp} -d ${POSTGRES_DB:-osshp}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - internal

  # --------------------------------------------------------------------------
  # storage — Garage v2.3.0 (S3-compatible object storage)
  # Replace for production S3: update S3_ENDPOINT in .env; this service
  # can be removed. No app code changes required (minio client abstraction).
  # NOTE: Requires one-time provisioning after first start — see docs/setup-runbook.md
  # Digest pinned for supply-chain reproducibility (A05/A06/A08 — M2.6).
  # To bump: docker pull dxflrs/garage:<newtag> && docker inspect dxflrs/garage:<newtag>
  #          --format '{{index .RepoDigests 0}}' — update tag and digest below.
  # --------------------------------------------------------------------------
  storage:
    image: dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    restart: unless-stopped
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    volumes:
      - ./config/garage.toml:/etc/garage.toml:ro
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
    networks:
      - internal

  # --------------------------------------------------------------------------
  # proxy — Caddy v2 (auto-HTTPS reverse proxy)
  # Terminates TLS in-stack. This means the app can and must set Secure cookies
  # by default (no loopback-HTTP exception, unlike an earlier internal portal setup).
  # Digest pinned for supply-chain reproducibility (A05/A06/A08 — M2.6).
  # To bump: docker pull caddy:2-alpine && docker inspect caddy:2-alpine
  #          --format '{{index .RepoDigests 0}}' — update digest below.
  # --------------------------------------------------------------------------
  proxy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # Caddy's site address. Defaults to the bare {$OSSHP_DOMAIN} so direct
      # mode is unchanged (bare domain → Caddy auto-HTTPS). Cloudflare Tunnel
      # mode sets OSSHP_CADDY_SITE_ADDRESS=http://<domain> in .env so Caddy
      # serves plain HTTP behind the tunnel (edge TLS) — see Caddyfile and
      # docker-compose.tunnel.yml.
      OSSHP_CADDY_SITE_ADDRESS: ${OSSHP_CADDY_SITE_ADDRESS:-${OSSHP_DOMAIN}}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - internal

volumes:
  db-data:
  garage-data:
  garage-meta:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
